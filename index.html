<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Login</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='style.css'>
</head>
<body>
    <main id="login">
        <form class="form">
            <h1>Acessar</h1>

            <label for="loginEmail">E-mail</label>
            <input type="email" id="loginEmail" placeholder="Informe seu E-mail">

            <label for="loginSenha">Senha</label>
            <input type="password" id="loginSenha" placeholder="Informe sua Senha">

            <!-- Botão para fazer o login -->
            <button class="w-100 btn btn-lg btn-primary" type="button" onclick="acessar()">Entrar</button>

            <p class="mt-5 mb-3 text-muted">&copy; 2025–2027</p>
        </form>
    </main>

    <script src="main.js"></script>
</body>
</html>
